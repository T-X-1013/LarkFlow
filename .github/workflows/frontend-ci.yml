name: Frontend CI

on:
  push:
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "LarkFlow/frontend/**"
  pull_request:
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "LarkFlow/frontend/**"
  workflow_dispatch:

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LarkFlow/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "LarkFlow/frontend/package.json"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
