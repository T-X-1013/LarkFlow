# Skill Routing Table (canonical source)
#
# This YAML is the single source of truth for keyword -> skill routing.
# The Markdown file `skill-routing.md` is a human-readable mirror and is
# generated from this file by `scripts/gen_skill_routing_md.py`. Do NOT
# hand-edit the Markdown; edit this YAML and regenerate.
#
# Phase 2 agent MUST read this file, match the demand text against `keywords`
# (case-insensitive, substring), and read every matched skill BEFORE writing code.
#
# Scoring: when multiple entries match, sort by `weight` DESC and read every
# matched skill. Higher weight = earlier context priority, not a filter.
# Business skills (domain/*) default to weight 1.2 so they outrank generic ones.
#
# Path is relative to the LarkFlow workspace root.
#
# Per-route fields:
#   keywords         : list[str]   lowercase, used for matching
#   skill            : str         ref file path relative to workspace root
#   weight           : float       priority; >=1.1 renders bold in the mirror md
#   display_keywords : str (opt)   human-friendly comma-joined form for the md
#                                  table; falls back to `keywords` as-is if absent
#   description      : str (opt)   one-line description column in the md table

routes:
  # ---------- Generic / cross-cutting ----------
  - keywords: [mysql, postgresql, sql, gorm, database, 数据库, orm, transaction, 事务, migration]
    display_keywords: "MySQL, PostgreSQL, SQL, GORM, Database, 数据库, ORM, Transaction, 事务, Migration"
    description: "SQL injection prevention, transactions, resource leaks"
    skill: skills/infra/database.md
    weight: 1.0

  - keywords: [redis, cache, 缓存, 分布式锁, distributed lock, pipeline, expiration, ttl]
    display_keywords: "Redis, Cache, 缓存, 分布式锁, Pipeline, Expiration, TTL"
    description: "Redis client, key expiration, pipelines"
    skill: skills/infra/redis.md
    weight: 1.0

  - keywords: [http, api, rest, router, middleware, 路由, 中间件, request, response, openapi, google.api.http]
    display_keywords: "HTTP, API, REST, Router, 路由, 中间件, Request, Response, OpenAPI, google.api.http"
    description: "Kratos transport/http, proto 注解路由, errors proto → HTTP status"
    skill: skills/transport/http.md
    weight: 1.0

  - keywords: [grpc, rpc, 服务间调用, 内部调用, protobuf, proto service, metadata, errors proto, 服务调用]
    display_keywords: "gRPC, RPC, 服务间调用, 内部调用, Protobuf, Proto service, Metadata, Errors proto, 服务调用"
    description: "Kratos transport/grpc, 客户端拦截器, 超时/metadata 透传, errors 映射"
    skill: skills/transport/rpc.md
    weight: 1.1

  - keywords: [mq, 消息队列, message queue, kafka, rocketmq, rabbitmq, pulsar, nats jetstream,
               producer, consumer, 生产者, 消费者, topic, 分区, partition, offset, 位点, 消费位点,
               死信, dlq, 事件驱动, event-driven, event driven, outbox, 异步解耦, 发消息, 消费消息,
               消息投递, 重平衡, rebalance]
    display_keywords: "MQ, 消息队列, Message Queue, Kafka, RocketMQ, RabbitMQ, Pulsar, NATS JetStream, Producer, Consumer, Topic, 分区, Offset, 位点, DLQ, Outbox, 事件驱动, Event-driven"
    description: "投递语义 (at-least-once)、手动 commit offset、分区键顺序、DLQ、Kratos consumer server、outbox 模式"
    skill: skills/transport/mq.md
    weight: 1.1

  - keywords: [trace, 链路, 链路追踪, otel, opentelemetry, metrics, 指标, prometheus, 可观测, observability, span, trace_id]
    display_keywords: "Trace, 链路, 链路追踪, OTel, OpenTelemetry, Metrics, 指标, Prometheus, 可观测, Observability, Span, trace_id"
    description: "OTel + OTLP gRPC, Kratos tracing/metrics middleware, /metrics 暴露, trace_id 与 log 打通"
    skill: skills/governance/observability.md
    weight: 1.1

  - keywords: [熔断, circuit breaker, 重试, retry, 降级, resilience, 超时预算, timeout budget, 退避, backoff, 韧性]
    display_keywords: "熔断, Circuit Breaker, 重试, Retry, 降级, Resilience, 超时预算, Timeout Budget, 退避, Backoff, 韧性"
    description: "超时预算、指数退避+jitter、Kratos circuitbreaker、重试/熔断/限流的链路顺序"
    skill: skills/governance/resilience.md
    weight: 1.0

  - keywords: [服务发现, discovery, registry, etcd, nacos, consul, zookeeper, 注册中心, 负载均衡, p2c, 灰度]
    display_keywords: "服务发现, Discovery, Registry, etcd, Nacos, Consul, Zookeeper, 注册中心, 负载均衡, p2c, 灰度"
    description: "Kratos registry 抽象、discovery:// DSN、p2c 默认 LB、优雅下线与灰度"
    skill: skills/governance/service_discovery.md
    weight: 1.0

  - keywords: [error, 错误, exception, 异常, wrap, errors.is, errors.as, fmt.errorf, sentinel]
    display_keywords: "Error, 错误, Exception, 异常, Wrap, fmt.Errorf, Sentinel"
    description: "Error wrapping and sentinel errors"
    skill: skills/lang/error.md
    weight: 1.0

  - keywords: [goroutine, concurrency, 并发, async, 异步, waitgroup, errgroup, channel, context]
    display_keywords: "Goroutine, Concurrency, 并发, Async, WaitGroup, errgroup, Channel, Context"
    description: "Goroutine lifecycle, context cancellation"
    skill: skills/lang/concurrency.md
    weight: 1.0

  - keywords: [log, logging, 日志, slog, zap, zerolog, trace_id, 结构化日志]
    display_keywords: "Log, Logging, 日志, slog, zap, trace_id, 结构化日志"
    description: "Structured JSON logging, trace IDs, PII redaction"
    skill: skills/governance/logging.md
    weight: 1.0

  - keywords: [config, 配置, env, environment, secret, 密钥, dotenv, .env]
    display_keywords: "Config, 配置, Env, Secret, 密钥, dotenv"
    description: "Env-var config loading, secret handling, startup validation"
    skill: skills/infra/config.md
    weight: 1.0

  - keywords: [auth, 认证, 授权, login, 登录, jwt, session, oauth, rbac, 权限]
    display_keywords: "Auth, 认证, 授权, Login, 登录, JWT, Session, OAuth, RBAC, 权限"
    description: "JWT pinning, middleware placement, constant-time compare"
    skill: skills/governance/auth.md
    weight: 1.0

  - keywords: [rate limit, 限流, throttle, 令牌桶, token bucket, 429, quota]
    display_keywords: "Rate Limit, 限流, Throttle, 令牌桶, 429, Quota"
    description: "Per-identity limiting, 429 semantics, Redis-backed counters"
    skill: skills/governance/rate_limit.md
    weight: 1.0

  - keywords: [idempotency, 幂等, idempotent, dedup, 去重, retry, 重放, webhook]
    display_keywords: "Idempotency, 幂等, Dedup, 去重, Retry, 重放, Webhook"
    description: "Idempotency keys, webhook dedup, response persistence"
    skill: skills/governance/idempotency.md
    weight: 1.0

  - keywords: [pagination, 分页, page, cursor, offset, limit, list endpoint]
    display_keywords: "Pagination, 分页, Page, Cursor, Offset, Limit"
    description: "Bounded page size, cursor pagination, stable sort"
    skill: skills/transport/pagination.md
    weight: 1.0

  - keywords: [python, pipeline, tests, 注释, docstring, dataclass, 常量注释]
    display_keywords: "Python, pipeline, tests, 注释, docstring, dataclass"
    description: "Python 注释与 docstring 规范 (pipeline / tests)"
    skill: skills/lang/python-comments.md
    weight: 0.8

  # ---------- Framework skills (highest weight: 架构级硬约束) ----------
  - keywords: [kratos, wire, 分层, api 层, internal/biz, internal/data, internal/service, proto, 骨架, scaffold]
    display_keywords: "Kratos, Wire, 分层, API 层, internal/biz, internal/data, internal/service, Proto, 骨架, Scaffold"
    description: "Kratos 四层布局、跨层禁例、新 domain 5 步流程、wire/make 工具链"
    skill: skills/framework/kratos.md
    weight: 1.3

  # ---------- Business skills (higher weight) ----------
  - keywords: [order, 订单, 下单, 购物车, checkout, 超卖, 库存]
    display_keywords: "订单, 下单, 购物车, Checkout, 超卖, 库存"
    description: "电商订单状态机、接口幂等、防超卖"
    skill: skills/domain/order.md
    weight: 1.2

  - keywords: [user, 用户, account, 账户, register, 注册, signup, 密码, password, 爆破]
    display_keywords: "用户, Account, 注册, Register, 密码, Password, 爆破"
    description: "密码 bcrypt、登录防爆破、注册幂等、风控"
    skill: skills/domain/user.md
    weight: 1.2

  - keywords: [payment, 支付, 付款, refund, 退款, 对账, reconciliation, 回调, callback, stripe, 微信支付, 支付宝]
    display_keywords: "支付, Payment, Refund, 退款, 对账, 回调, Callback, Stripe, 微信支付, 支付宝"
    description: "回调验签 + 幂等、金额 int64、状态机、对账"
    skill: skills/domain/payment.md
    weight: 1.2

# When no route matches, Phase 2 agent should still read at least:
#   - skills/framework/kratos.md           # 骨架布局是所有 demo-app 产物的前提，必读
#   - skills/governance/observability.md   # trace_id 对所有服务都是刚需，防止调用链断链
#   - skills/lang/error.md
#   - skills/transport/http.md
# These are baseline skills assumed for any Go service work.
defaults:
  - skills/framework/kratos.md
  - skills/governance/observability.md
  - skills/lang/error.md
  - skills/transport/http.md
