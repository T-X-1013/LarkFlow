# Skill Routing Table (canonical source)
#
# This YAML is the single source of truth for skill routing. The Markdown file
# `skill-routing.md` is a human-readable mirror generated by
# `scripts/gen_skill_routing_md.py`. Do NOT hand-edit the Markdown; edit this
# YAML and regenerate.
#
# Routing is done by `pipeline/skills/router.py` (deterministic code) — not by
# the LLM. Agents receive the resolved skill list in the system prompt and
# should NOT re-match this file themselves.
#
# Three tiers:
#
#   baseline     : unconditional — every Go service change reads these.
#   conditional  : mandatory when the trigger fires (keyword match).
#                  Not subject to top-K truncation.
#   routes       : weight-based top-K recall for everything else.
#                  Sorted by `weight` DESC, business skills (domain/*) tie-break
#                  by winning generic ones. Default K = 5.
#
# Path is relative to the LarkFlow workspace root.
#
# Field reference:
#   baseline[*].skill        : str   path to the skill file
#   baseline[*].reason       : str   one-line rationale (shown to agents)
#
#   conditional[*].skill     : str   path to the skill file
#   conditional[*].trigger   : dict  trigger spec
#     trigger.keywords_any   : list[str]   any match fires the skill
#                                          (case-insensitive substring)
#   conditional[*].reason    : str   one-line rationale
#
#   routes[*].keywords         : list[str]   lowercase, substring match
#   routes[*].skill            : str         ref file path
#   routes[*].weight           : float       priority; >= 1.1 bold in the md
#   routes[*].display_keywords : str (opt)   human-friendly comma form for md
#   routes[*].description      : str (opt)   one-line description in md table

schema_version: 2

# ---------------------------------------------------------------------------
# Tier-0: baseline — unconditional reads for every Go service change
# ---------------------------------------------------------------------------
baseline:
  - skill: skills/framework/kratos.md
    reason: "Kratos 四层布局是 demo-app 所有产物的硬约束，违反即构建失败"

  - skill: skills/lang/error.md
    reason: "所有 handler / usecase 必须遵守 errors proto + wrap 规范"

  - skill: skills/governance/observability.md
    reason: "trace_id 跨层透传是刚需，断链即失观测"

  - skill: skills/governance/logging.md
    reason: "结构化 JSON 日志 + PII 脱敏，所有服务统一基线"

# ---------------------------------------------------------------------------
# Tier-1: conditional — mandatory when the trigger fires
# ---------------------------------------------------------------------------
conditional:
  - skill: skills/transport/http.md
    trigger:
      keywords_any:
        - http
        - api
        - rest
        - router
        - middleware
        - 接口
        - 路由
        - 中间件
        - request
        - response
        - openapi
        - google.api.http
        - 对外接口
        - 后端接口
        - endpoint
        - 端点
    reason: "需求涉及对外 HTTP / REST API，http.md 定义注解路由与错误码映射"

  - skill: skills/infra/database.md
    trigger:
      keywords_any:
        - mysql
        - postgresql
        - sql
        - gorm
        - database
        - orm
        - transaction
        - migration
        - 数据库
        - 数据表
        - 表结构
        - 事务
        - 建表
        - 加字段
        - 新字段
        - 新增字段
        - 改表结构
        - 字段
        - 持久化
        - 落库
        - 索引
        - index
    reason: "需求涉及表结构 / 事务 / 持久化，database.md 定义 SQL 注入防御与事务边界"

  - skill: skills/infra/config.md
    trigger:
      keywords_any:
        - config
        - 配置
        - env
        - environment
        - secret
        - 密钥
        - dotenv
        - .env
        - 开关
        - 阈值
        - feature flag
        - 参数配置
        - 环境变量
    reason: "需求引入新配置 / 开关 / 阈值，config.md 定义启动校验与密钥处理"

  - skill: skills/lang/python-comments.md
    trigger:
      keywords_any:
        - larkflow
        - pipeline/
        - tests/
        - scripts/
        - pytest
        - 注释规范
        - docstring
        - python 注释
        - 改 pipeline
        - 改 tests
    reason: "改动落在 LarkFlow Python 代码区，必须遵守注释 / docstring 规范"

  - skill: skills/transport/pagination.md
    trigger:
      keywords_any:
        - 列表
        - 列表页
        - list endpoint
        - 分页
        - pagination
        - page
        - cursor
        - offset
        - limit
        - 翻页
        - 分批
    reason: "涉及列表 / 分页 API，pagination.md 定义游标分页与稳定排序"

  - skill: skills/governance/idempotency.md
    trigger:
      keywords_any:
        - 幂等
        - idempotency
        - idempotent
        - dedup
        - 去重
        - 重放
        - webhook
        - 回调
        - callback
        - at-least-once
        - 重复提交
        - 消费消息
        - mq 消费
    reason: "涉及回调 / 消费 / 重复提交场景，idempotency.md 定义幂等键与响应持久化"

# ---------------------------------------------------------------------------
# Tier-2: routes — weight-based top-K recall
#   Baseline / conditional skills are intentionally omitted here to avoid
#   double-counting; they are always or conditionally included upstream.
# ---------------------------------------------------------------------------
routes:
