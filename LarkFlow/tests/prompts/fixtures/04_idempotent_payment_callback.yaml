name: idempotent_payment_callback
requirement: |
  实现微信支付异步回调接口 POST /pay/callback：
  1. 验证签名（X-Signature + 公钥）
  2. 根据 out_trade_no 幂等处理，同一回调重复到达只能结算一次
  3. 订单从 PENDING 流转到 PAID，使用事务 + 状态条件更新
  4. 返回渠道要求的成功响应

expect_phase1_tools:
  - inspect_db
  - ask_human_approval

expect_phase2_skills_read:
  - skills/biz/payment.md
  - skills/idempotency.md
  - skills/http.md
  - skills/database.md

expect_phase2_files_written_patterns:
  - "internal/handler/*.go"
  - "internal/service/*.go"

expect_phase2_required_patterns:
  - 'ConstantTimeCompare'            # signature verify uses constant-time compare
  - 'WHERE.*status.*PENDING'         # state-machine guard in UPDATE

expect_phase2_forbidden_patterns:
  - 'AmountCents.*float'             # amount must not be float
  - 'float64.*amount'
