name: bugfix
description: 修 bug 专用：Review 回归上限提高到 5，单测严格，Design HITL 保留

entry: design

nodes:
  design:
    prompt_file: phase1_design.md
    depends_on: []
    checkpoint: design
    retry:
      max_attempts: 1
  coding:
    prompt_file: phase2_coding.md
    depends_on: [design]
    retry:
      max_attempts: 2          # 修 bug 时 coding 允许多试一次
  test:
    prompt_file: phase3_test.md
    depends_on: [coding]
    retry:
      max_attempts: 1
  review:
    prompt_file: phase4_review.md
    depends_on: [test]
    checkpoint: deploy
    retry:
      max_attempts: 1
    on_failure:
      action: regress
      to: coding
      max_attempts: 5          # bugfix 场景允许更多次回归自愈
