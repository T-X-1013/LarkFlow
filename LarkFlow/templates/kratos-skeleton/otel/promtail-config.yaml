server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '/otel-(.*)-1'
        target_label: service
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

  - job_name: larkflow-file
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            level: level
            demand_id: demand_id
            phase: phase
            event: event
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05"
          location: Asia/Shanghai
      - labels:
          level:
          phase:
          event:
    static_configs:
      - targets: [localhost]
        labels:
          job: larkflow-file
          service: larkflow
          __path__: /var/log/larkflow/*.jsonl

  - job_name: larkflow-runtime
    static_configs:
      - targets: [localhost]
        labels:
          job: larkflow-runtime
          service: larkflow
          __path__: /var/log/larkflow/*.log
